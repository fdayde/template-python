default_language_version:
  python: python3.13

repos:
  - repo: local
    hooks:
      # Both hooks run the project's ruff via uv (from the venv) — same version as CI.
      # They check only the staged files (fast); CI checks the whole repo.
      - id: ruff-check
        name: Ruff linter
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff formatter
        entry: uv run --no-sync ruff format
        language: system
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
        args: ['--maxkb=1000']
